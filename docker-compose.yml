version: '3.9'

services:
  backend:
    build:
      context: ./backend
    container_name: py_micro_backend
    ports:
      - "8000:8000"
    networks:
      - py_micro_net

  frontend:
    build:
      context: ./frontend
    container_name: py_micro_frontend
    ports:
      - "5000:5000"
    networks:
      - py_micro_net

  nginx:
    image: nginx:stable
    container_name: py_micro_nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - py_micro_net

networks:
  py_micro_net:
    driver: bridge
